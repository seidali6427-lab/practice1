<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puppy Lover Page</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="my-header blueBG">
        <div class="puppy-header">
            <h1>Puppy Lover Page</h1>
        </div>
    </header>

    <section class="banner-img">
        <img src="images/banner-puppies.jpg" alt="Banner with puppies">
    </section>

    <section class="puppy-section">
        <div class="puppy1">
            <img src="images/puppy-1.jpg" alt="Puppy 1">
        </div>
        <div class="miss">
            <div class="missing-puppy">
                <p>Puppy missing here!!</p>
            </div>
        </div>
        <div class="puppy2">
            <img src="images/puppy-2.jpg" alt="Puppy 2">
        </div>
    </section>

    <h1>More Puppies</h1>

    <section class="puppy-section puppy-bottom">
        <div class="puppy3">
            <img src="images/puppy-3.jpg" alt="Puppy 3">
        </div>
        <div class="puppy4">
            <img src="images/puppy-4.jpg" alt="Puppy 4">
        </div>
    </section>

    <footer class="my-footer">
        <div>
            <h2>Developed By: Seid</h2>
        </div>
    </footer>
</body>
</html>
